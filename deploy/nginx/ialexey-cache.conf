# Include this file inside the alexgetman.com nginx server block.
# The Astro build fingerprints /_astro assets, so they can be cached for a year.

location = /posts {
    add_header X-Robots-Tag "noindex" always;
    return 410;
}

location ^~ /posts/ {
    add_header X-Robots-Tag "noindex" always;
    return 410;
}

location = /ru/posts {
    add_header X-Robots-Tag "noindex" always;
    return 410;
}

location ^~ /ru/posts/ {
    add_header X-Robots-Tag "noindex" always;
    return 410;
}

location = /en {
    add_header X-Robots-Tag "noindex" always;
    return 410;
}

location ^~ /en/ {
    add_header X-Robots-Tag "noindex" always;
    return 410;
}

location ^~ /_astro/ {
    access_log off;
    add_header Cache-Control "public, max-age=31536000, immutable" always;
    try_files $uri =404;
}

location ^~ /habr-images/ {
    access_log off;
    add_header Cache-Control "public, max-age=2592000" always;
    try_files $uri =404;
}

location ~* ^/(avatar-small\.webp|avatar-small\.png|stream-cover-[a-z0-9_-]+\.webp|favicon\.svg|favicon\.ico|bot-screenshot\.jpg)$ {
    access_log off;
    add_header Cache-Control "public, max-age=2592000" always;
    try_files $uri =404;
}

location ~* ^/(feed\.xml|feed\.json|llms\.txt|index\.md|robots\.txt|sitemap.*\.xml)$ {
    add_header Cache-Control "public, max-age=60" always;
    try_files $uri =404;
}

location ~* \.html$ {
    add_header Cache-Control "no-cache" always;
    add_header Link $link_header always;
    try_files $uri =404;
}
